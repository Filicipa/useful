- job_name: "blackbox_http"
  metrics_path: /probe
  params:
    module:
      - http_2xx
  file_sd_configs:
    - files:
        - /targets/blackbox.yaml
  relabel_configs:
    - source_labels: [__address__]
      target_label: __param_target
    - source_labels: [__param_target] # remove for Dashboard https://grafana.com/grafana/dashboards/13659-blackbox-exporter-http-prober/
      target_label: service # remove for Dashboard https://grafana.com/grafana/dashboards/13659-blackbox-exporter-http-prober/
    - target_label: __address__
      replacement: blackbox:9115
