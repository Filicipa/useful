services:
  valkey:
    image: valkey/valkey:9.1.0
    container_name: valkey
    restart: unless-stopped
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - valkey

networks:
  valkey:
    name: valkey
