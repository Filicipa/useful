stages:
  - build
  - deploy

build:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: 1
  before_script:
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    - docker buildx create --use
    - docker buildx inspect --bootstrap
  script:
    - |
      docker buildx build \
        --target runner \
        --tag $CI_REGISTRY_IMAGE/dev-api:$CI_COMMIT_SHORT_SHA \
        --tag $CI_REGISTRY_IMAGE/dev-api:latest \
        --cache-from=type=registry,ref=$CI_REGISTRY_IMAGE/cache \
        --cache-to=type=registry,ref=$CI_REGISTRY_IMAGE/cache,mode=max \
        --push \
        .

deploy:
  stage: deploy
  needs:
    - build
  image:
    name: dtzar/helm-kubectl:latest
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  before_script:
    - apk add aws-cli
    - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_DEFAULT_REGION
    - kubectl get nodes
  script:
    - git config --global user.email "ci-bot@example.com"
    - git config --global user.name "CI Bot"
    - git clone --branch dev https://oauth2:$INFRA_REPO_TOKEN@gitlab.com/clovrlabs/lumos/tron-intelligence-system-infrastructure.git charts
    - cd charts/api
    - yq eval ".image.tag = \"$CI_COMMIT_SHORT_SHA\"" -i values_dev.yaml
    - git add values_dev.yaml
    - git commit -m "Update dev-api image tag to $CI_COMMIT_SHORT_SHA" || echo "No changes to commit"
    - git push https://oauth2:$INFRA_REPO_TOKEN@gitlab.com/clovrlabs/lumos/tron-intelligence-system-infrastructure.git dev
    - helm upgrade --install api ./ -n lumos -f values_dev.yaml --create-namespace --wait --timeout 1m
    - kubectl rollout status deployment/api -n lumos --timeout=60s
