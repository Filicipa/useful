services:
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./users.yml:/data/users.yml:ro
    ports:
      - 8080:8080
    environment:
      DOZZLE_BASE: /logs
      DOZZLE_AUTH_PROVIDER: simple
      DOZZLE_HOSTNAME: mywebsite.xyz
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 20s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - networkName
